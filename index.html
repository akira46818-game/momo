<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI秘書 ももちゃん</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="chat-container">
        <div id="header">
            <h2>AI秘書 ももちゃん </h2>
        </div>
        <div id="chat-log">
            <div class="bot-msg">こんにちは！あなたの秘書の「もも」です。今日もお仕事頑張りましょうね！</div>
        </div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="ももちゃんに話しかける...">
            <button id="send-btn">送信</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
